apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 968641182612.dkr.ecr.eu-north-1.amazonaws.com/edugen-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
        # Health Probes
        livenessProbe:
          tcpSocket:
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8501
          initialDelaySeconds: 20
          periodSeconds: 10
        # Resource Management
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        # Environment Variables
        env:
        - name: API_URL
          value: "http://backend-service:8000"
