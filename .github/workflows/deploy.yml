name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-backend.txt
        pip install -r requirements-frontend.txt

    - name: Build Backend Image
      run: |
        docker build -t backend:${{ github.sha }} -f Dockerfile.backend .
        docker tag backend:${{ github.sha }} backend:latest

    - name: Build Frontend Image
      run: |
        docker build -t frontend:${{ github.sha }} -f Dockerfile.frontend .
        docker tag frontend:${{ github.sha }} frontend:latest

    # Note: In a real CI/CD, you would push images to a registry (DockerHub/GHCR)
    # and then run `kubectl set image` or `kubectl apply` against a cluster.
    
